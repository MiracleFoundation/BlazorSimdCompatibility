name: Deploy Sample to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install wasm-tools
        run: dotnet workload install wasm-tools wasm-tools-net8

      - name: Clear NuGet cache
        run: dotnet nuget locals all --clear

      - name: Pack library (local NuGet feed for sample)
        run: dotnet pack src/BlazorSimdCompatibility/BlazorSimdCompatibility.csproj --configuration Release --output nupkgs --nologo

      - name: Pack CLI tool
        run: dotnet pack src/BlazorSimdCompatibility.Cli/BlazorSimdCompatibility.Cli.csproj --configuration Release --output nupkgs --nologo

      - name: Install CLI tool (from local nupkg)
        run: dotnet tool install -g BlazorSimdCompatibility.Cli --add-source nupkgs

      - name: Dual publish
        run: blazor-simd-compat publish --project samples/BlazorWasmSample --output bin/Publish

      - name: Verify output
        run: blazor-simd-compat verify bin/Publish/wwwroot

      - name: Fix base href for GitHub Pages
        run: |
          # GitHub Pages serves from /repo-name/, so we need to update base href
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|" bin/Publish/wwwroot/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bin/Publish/wwwroot

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
