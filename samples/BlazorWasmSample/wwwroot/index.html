<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorWasmSample — BlazorSimdCompatibility</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorWasmSample.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <!-- Debug overlay: always visible, shows all logs -->
    <div id="boot-debug" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:99999;background:#1a1a2e;color:#0f0;padding:16px;font:13px/1.5 monospace;overflow:auto;white-space:pre-wrap;">
      <div style="color:#0ff">[debug] Loading... — <script>document.write(navigator.userAgent)</script></div>
    </div>
    <script>
      (function() {
        var el = document.getElementById('boot-debug');
        function add(type, args) {
          var line = document.createElement('div');
          line.style.color = type === 'error' ? '#f55' : type === 'warn' ? '#ff0' : '#0f0';
          var parts = [];
          for (var i = 0; i < args.length; i++) {
            try { parts.push(typeof args[i] === 'object' ? JSON.stringify(args[i]) : String(args[i])); } catch(e) { parts.push(String(args[i])); }
          }
          line.textContent = '[' + type + '] ' + parts.join(' ');
          el.appendChild(line);
          el.scrollTop = el.scrollHeight;
        }
        var origLog = console.log;
        var origWarn = console.warn;
        var origErr = console.error;
        console.log = function() { add('LOG', arguments); origLog.apply(console, arguments); };
        console.warn = function() { add('WARN', arguments); origWarn.apply(console, arguments); };
        console.error = function() { add('ERR', arguments); origErr.apply(console, arguments); };
        window.onerror = function(msg, src, line, col, err) {
          add('ERR', [msg + ' (' + src + ':' + line + ')']);
        };
        window.addEventListener('unhandledrejection', function(e) {
          add('ERR', ['Unhandled rejection: ' + e.reason]);
        });
      })();
    </script>

    <!-- Blazor loader with autostart=false so SIMD detection can run first -->
    <!-- .NET 8: use literal filename. .NET 9+: use #[.{fingerprint}] placeholder -->
    <script src="_framework/blazor.webassembly.js" autostart="false"
        onerror="window.__blazorLoaderFailed=true;console.error('[boot] Blazor loader script failed to load');">
    </script>

    <!-- wasm-feature-detect (self-hosted via BlazorSimdCompatibility package) -->
    <script src="_content/BlazorSimdCompatibility/wasm-feature-detect.1.5.1.js"
        onerror="window.__featureDetectFailed=true;console.error('[boot] wasm-feature-detect failed to load');">
    </script>

    <!-- SIMD detection + Blazor auto-start -->
    <script src="_content/BlazorSimdCompatibility/blazor-simd-compat.js"></script>
</body>

</html>
